name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          reshim: true
          cache: false
      - run: |
          echo "--- mise which purs ---"
          mise which purs || true
          echo "--- ls -la real purs binary ---"
          ls -la "$(mise which purs)" || true
          echo "--- direct exec of real purs binary ---"
          "$(mise which purs)" --version || true
          echo "--- mise exec -- purs --version ---"
          mise exec -- purs --version || true
          echo "--- PATH ---"
          echo "$PATH"
          echo "--- which purs (plain PATH lookup) ---"
          which purs || true
          echo "--- purs --version (plain PATH lookup) ---"
          purs --version || true
      - run: mise run build
      - run: mise run test
